version: '3.8'

services:
  db:
    image: postgres:16
    container_name: gymwall_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Alejandro85
      POSTGRES_DB: gymwall
    ports:
      - "5433:5432"
    volumes:
      - gymwall_postgres_data:/var/lib/postgresql/data
      - ./backend/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: gymwall_backend
    environment:
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: gymwall
      DB_PASSWORD: Alejandro85
      DB_PORT: 5432
      JWT_SECRET: gymwall_clave_secreta_2026
      PORT: 3001
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    container_name: gymwall_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  gymwall_postgres_data: